<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralSub AI - Professional Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .glass-panel { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid #3f3f46; }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 h-screen overflow-hidden flex flex-col">

    <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-6 shrink-0 bg-[#09090b]">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg">
                <i data-lucide="zap" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">ViralSub <span class="text-indigo-500 text-sm font-medium">PRO</span></span>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-badge" class="hidden flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                </span>
                <span id="status-text">Đang xử lý...</span>
            </div>
            <button class="p-2 hover:bg-zinc-800 rounded-md transition-colors"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-4 gap-4">
        
        <aside class="w-80 flex flex-col gap-4 overflow-y-auto custom-scrollbar shrink-0">
            <div class="glass-panel rounded-2xl p-5 flex flex-col gap-6">
                <div>
                    <label class="text-sm font-semibold mb-3 flex items-center gap-2"><i data-lucide="shield-check" class="w-4 h-4 text-indigo-400"></i> MẬT KHẨU HỆ THỐNG</label>
                    <input type="password" id="sysPassword" placeholder="Nhập pass để mở khóa..." class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-all">
                </div>

                <div class="border-t border-zinc-800 pt-6">
                    <label class="text-sm font-semibold mb-3 flex items-center gap-2"><i data-lucide="video" class="w-4 h-4 text-indigo-400"></i> NGUỒN VIDEO</label>
                    <div class="flex flex-col gap-3">
                        <div class="relative group">
                            <input type="file" id="videoFile" class="hidden">
                            <button onclick="document.getElementById('videoFile').click()" class="w-full border-2 border-dashed border-zinc-700 hover:border-indigo-500 rounded-xl p-6 transition-all flex flex-col items-center gap-2 group-hover:bg-zinc-900">
                                <i data-lucide="upload-cloud" class="w-8 h-8 text-zinc-500 group-hover:text-indigo-400"></i>
                                <span class="text-xs text-zinc-500" id="fileName">Tải file lên hoặc kéo thả</span>
                            </button>
                        </div>
                        <div class="relative">
                            <input type="text" id="videoUrl" placeholder="Hoặc dán URL YouTube/Douyin..." class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 transition-all pl-10">
                            <i data-lucide="link" class="w-4 h-4 absolute left-3 top-3 text-zinc-500"></i>
                        </div>
                    </div>
                </div>

                <div class="border-t border-zinc-800 pt-6">
                    <label class="text-sm font-semibold mb-3 flex items-center gap-2"><i data-lucide="languages" class="w-4 h-4 text-indigo-400"></i> PHONG CÁCH DỊCH</label>
                    <select id="styleSelect" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 appearance-none cursor-pointer transition-all">
                        <option value="normal">🌐 Việt hóa tự nhiên (Mặc định)</option>
                        <option value="genz">🔥 GenZ (Hài hước, bắt trend)</option>
                        <option value="pro">💼 Chuyên nghiệp (Lịch sự)</option>
                    </select>
                </div>

                <div class="border-t border-zinc-800 pt-6">
                    <label class="text-sm font-semibold mb-3 flex items-center gap-2 text-zinc-400 font-normal">Gemini API Key (Tùy chọn)</label>
                    <input type="text" id="geminiKey" placeholder="Nếu không có sẽ dùng mặc định..." class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-indigo-500 transition-all">
                </div>

                <button id="btnProcess" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2">
                    <i data-lucide="play" class="w-5 h-5 fill-current"></i> BẮT ĐẦU XỬ LÝ
                </button>
            </div>
        </aside>

        <section class="flex-1 flex flex-col gap-4 min-w-0">
            <div class="glass-panel rounded-2xl overflow-hidden shrink-0 aspect-video flex items-center justify-center relative group">
                <video id="player" controls class="w-full h-full hidden bg-black"></video>
                <div id="video-placeholder" class="flex flex-col items-center gap-4 text-zinc-500">
                    <div class="w-16 h-16 rounded-full bg-zinc-900 flex items-center justify-center border border-zinc-800">
                        <i data-lucide="monitor-play" class="w-8 h-8"></i>
                    </div>
                    <p class="text-sm">Video của bạn sẽ hiển thị tại đây</p>
                </div>
            </div>

            <div class="glass-panel rounded-2xl flex-1 overflow-hidden flex flex-col">
                <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/30">
                    <span class="text-xs font-bold uppercase tracking-wider text-zinc-500">Bản bóc băng gốc (Tiếng Trung)</span>
                    <button id="copyZh" class="text-xs hover:text-indigo-400 flex items-center gap-1 transition-colors"><i data-lucide="copy" class="w-3 h-3"></i> Sao chép</button>
                </div>
                <div id="zhContent" class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-4">
                    <p class="text-zinc-600 text-center mt-10 text-sm italic">Nội dung gốc sẽ hiện ở đây sau khi Groq xử lý...</p>
                </div>
            </div>
        </section>

        <aside class="w-96 glass-panel rounded-2xl flex flex-col overflow-hidden shrink-0">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/30">
                <span class="text-xs font-bold uppercase tracking-wider text-zinc-500">Bản dịch Việt hóa (AI Gemini)</span>
                <button id="downloadSrt" class="bg-indigo-600 hover:bg-indigo-500 text-xs px-3 py-1.5 rounded-lg transition-all flex items-center gap-1.5"><i data-lucide="download" class="w-3 h-3"></i> TẢI SRT</button>
            </div>
            <div id="viContent" class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-4">
                <p class="text-zinc-600 text-center mt-10 text-sm italic">Nhấn nút Bắt đầu để nhận bản dịch...</p>
            </div>
            <div class="p-4 bg-zinc-900/50 border-t border-zinc-800">
                <p class="text-[10px] text-zinc-500 leading-relaxed">Gợi ý: Bạn có thể click vào bất kỳ dòng sub nào để đồng bộ với video.</p>
            </div>
        </aside>
    </main>

    <script>
        lucide.createIcons();
        
        const videoFile = document.getElementById('videoFile');
        const fileNameLabel = document.getElementById('fileName');
        const player = document.getElementById('player');
        const placeholder = document.getElementById('video-placeholder');

        videoFile.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameLabel.textContent = file.name;
                player.src = URL.createObjectURL(file);
                player.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
        };

        // Hàm xử lý chính (Kết nối với Backend FastAPI của bạn)
        document.getElementById('btnProcess').onclick = async () => {
            const formData = new FormData();
            formData.append('video', videoFile.files[0]);
            formData.append('video_url', document.getElementById('videoUrl').value);
            formData.append('api_key', document.getElementById('geminiKey').value);
            formData.append('style', document.getElementById('styleSelect').value);
            formData.append('sys_password', document.getElementById('sysPassword').value);

            // Giao diện Loading
            document.getElementById('status-badge').classList.remove('hidden');
            document.getElementById('btnProcess').disabled = true;
            document.getElementById('btnProcess').innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> ĐANG XỬ LÝ...`;
            lucide.createIcons();

            try {
                const response = await fetch('/run-tool', { method: 'POST', body: formData });
                const result = await response.json();

                if (result.status === 'success') {
                    // Hiển thị nội dung bóc băng Trung
                    renderSubtitles(result.data.zh_srt, 'zhContent', 'text-zinc-400');
                    // Hiển thị nội dung dịch Việt
                    renderSubtitles(result.data.vi_srt, 'viContent', 'text-indigo-400 font-medium');
                    
                    if (result.data.video_url) {
                        player.src = result.data.video_url;
                        player.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                    }
                    
                    alert('Xử lý hoàn tất! Bạn có thể tải file SRT ngay bây giờ.');
                } else {
                    alert('Lỗi: ' + result.detail);
                }
            } catch (err) {
                alert('Lỗi kết nối Server: ' + err);
            } finally {
                document.getElementById('status-badge').classList.add('hidden');
                document.getElementById('btnProcess').disabled = false;
                document.getElementById('btnProcess').innerHTML = `<i data-lucide="play" class="w-5 h-5 fill-current"></i> BẮT ĐẦU XỬ LÝ`;
                lucide.createIcons();
            }
        };

        function renderSubtitles(srtData, containerId, textClass) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const blocks = srtData.split('\n\n');
            blocks.forEach(block => {
                const lines = block.split('\n');
                if (lines.length >= 3) {
                    const time = lines[1];
                    const text = lines.slice(2).join(' ');
                    const div = document.createElement('div');
                    div.className = 'group cursor-pointer hover:bg-zinc-800/50 p-2 rounded-lg transition-all border-l-2 border-transparent hover:border-indigo-500';
                    div.innerHTML = `
                        <p class="text-[10px] text-zinc-500 font-mono mb-1">${time}</p>
                        <p class="text-sm ${textClass}">${text}</p>
                    `;
                    container.appendChild(div);
                }
            });
        }

        // Tải SRT
        document.getElementById('downloadSrt').onclick = () => {
            const viContent = document.getElementById('viContent').innerText;
            if (!viContent || viContent.includes('Nhấn nút')) return alert('Chưa có dữ liệu để tải!');
            
            // Xây dựng nội dung SRT thô từ các dòng đã hiển thị (hoặc lấy lại từ kết quả biến lưu trữ)
            // Đơn giản nhất là tạo Blob từ dữ liệu sub Việt hóa
            const blob = new Blob([viContent], { type: 'text/srt' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ViralSub_Viet.srt';
            a.click();
        };
    </script>
</body>
</html>
