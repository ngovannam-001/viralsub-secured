<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralSub Pro - AI Video Translator</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 20% 20%, #1e293b, #020617); color: white; }
.glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
.glow { box-shadow: 0 0 20px rgba(34,211,238,0.25); }
.hover-scale { transition: all .25s ease; }
.hover-scale:hover { transform: scale(1.04); }
.bottom-sheet { transform: translate(-50%,100%); transition: all .45s cubic-bezier(0.33,1,0.68,1); }
.bottom-sheet.active { transform: translate(-50%,0); }
@keyframes shimmer { 0% {opacity:.5} 50% {opacity:1} 100% {opacity:.5} }
.loading { animation: shimmer 1.5s infinite; }
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
.sub-active { border-color: #22d3ee !important; background: rgba(255,255,255,0.1) !important; transform: scale(1.02); }
</style>
</head>

<body class="h-screen flex flex-col overflow-hidden">

<header class="h-14 px-6 flex justify-between items-center glass shrink-0">
    <div class="flex items-center gap-2">
        <i data-lucide="video" class="text-cyan-400"></i>
        <h1 class="font-bold text-lg bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent">ViralSub Pro</h1>
    </div>
    <div class="flex gap-3">
        <button id="btnExportVideo" class="hidden px-4 py-1.5 rounded-full bg-cyan-500 text-black text-xs font-bold hover-scale flex items-center gap-1"><i data-lucide="film" class="w-3 h-3"></i> Xuất Video</button>
        <button id="btnExport" class="px-4 py-1.5 rounded-full bg-white text-black text-xs font-bold hover-scale flex items-center gap-1"><i data-lucide="download" class="w-3 h-3"></i> Tải SRT</button>
    </div>
</header>

<main class="flex-1 flex flex-col md:flex-row overflow-hidden">
    <section class="md:w-3/5 flex items-center justify-center relative bg-black">
        <video id="player" class="w-full h-full object-contain hidden" controls playsinline></video>
        <div id="uploadUI" class="flex flex-col items-center gap-4 text-gray-400 cursor-pointer hover:text-cyan-400 transition" onclick="fileInput.click()">
            <div class="w-20 h-20 rounded-full glass flex items-center justify-center glow"><i data-lucide="upload" class="w-8 h-8"></i></div>
            <p class="text-sm">Upload video</p>
        </div>
        <input type="file" id="fileInput" class="hidden" accept="video/*">
        
        <div id="loading" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-md z-20">
            <div id="loadingText" class="text-cyan-400 loading text-sm font-semibold tracking-widest uppercase">AI đang xử lý...</div>
        </div>
    </section>

    <section class="flex-1 flex flex-col glass border-l border-white/10">
        <div class="p-4 text-xs uppercase opacity-40 font-bold tracking-widest flex justify-between items-center shrink-0">
            <span>Timeline Subtitles</span>
            <span class="text-[10px] lowercase italic font-normal">* Click vào chữ để sửa</span>
        </div>
        <div id="subs" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar scroll-smooth">
            <div class="opacity-20 text-center flex flex-col items-center mt-10">
                <i data-lucide="list-music" class="w-10 h-10 mb-2"></i> Chưa có dữ liệu
            </div>
        </div>
    </section>
</main>

<nav class="h-20 flex justify-center items-center gap-16 glass border-t border-white/10 shrink-0 z-30">
    <button onclick="openSheet('config')" class="opacity-60 hover:opacity-100 transition-opacity"><i data-lucide="settings"></i></button>
    <button id="processBtn" class="w-16 h-16 rounded-full bg-gradient-to-r from-purple-500 to-cyan-500 flex items-center justify-center glow hover-scale shadow-lg"><i data-lucide="sparkles" class="text-white"></i></button>
    <button onclick="openSheet('style')" class="opacity-60 hover:opacity-100 transition-opacity"><i data-lucide="palette"></i></button>
</nav>

<div id="overlay" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-40 transition-opacity" onclick="closeSheets()"></div>

<div id="config" class="bottom-sheet fixed bottom-0 left-1/2 w-full max-w-md glass p-6 rounded-t-3xl z-50">
    <div class="w-10 h-1 bg-white/20 rounded-full mx-auto mb-6"></div>
    <h3 class="text-center font-bold mb-4 uppercase tracking-widest text-xs text-cyan-400">Cấu hình</h3>
    
    <input id="password" type="password" placeholder="Password hệ thống" class="w-full p-4 rounded-xl bg-black/40 mb-4 border border-white/5 outline-none focus:border-cyan-500 transition-colors">
    <input id="url" type="text" placeholder="Video URL (Douyin/YouTube)" class="w-full p-4 rounded-xl bg-black/40 mb-4 border border-white/5 outline-none focus:border-cyan-500 transition-colors">
    
    <label class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest block mb-2">Ngôn ngữ dịch ra</label>
    <select id="lang" class="w-full p-4 rounded-xl bg-black/40 border border-white/5 outline-none focus:border-cyan-500 transition-colors text-white">
        <option value="vi">Tiếng Việt</option>
        <option value="en">English (Tiếng Anh)</option>
    </select>

    <button onclick="closeSheets()" class="w-full mt-6 py-4 rounded-xl bg-white text-black font-bold hover:bg-gray-200 transition-colors">Lưu</button>
</div>

<div id="style" class="bottom-sheet fixed bottom-0 left-1/2 w-full max-w-md glass p-6 rounded-t-3xl z-50">
    <div class="w-10 h-1 bg-white/20 rounded-full mx-auto mb-6"></div>
    <h3 class="text-center font-bold mb-4 uppercase tracking-widest text-xs text-cyan-400">Phong cách AI</h3>
    <div class="space-y-3">
        <label class="flex justify-between items-center p-4 rounded-xl bg-black/40 border border-white/5 cursor-pointer"><span>🌐 Tự nhiên</span><input type="radio" name="style" value="normal" checked class="accent-cyan-400 w-4 h-4"></label>
        <label class="flex justify-between items-center p-4 rounded-xl bg-black/40 border border-white/5 cursor-pointer"><span>🔥 GenZ</span><input type="radio" name="style" value="genz" class="accent-cyan-400 w-4 h-4"></label>
        <label class="flex justify-between items-center p-4 rounded-xl bg-black/40 border border-white/5 cursor-pointer"><span>💼 Pro</span><input type="radio" name="style" value="pro" class="accent-cyan-400 w-4 h-4"></label>
    </div>
    <button onclick="closeSheets()" class="w-full mt-6 py-4 rounded-xl bg-white text-black font-bold hover:bg-gray-200 transition-colors">Xác nhận</button>
</div>

<script>
lucide.createIcons();

const fileInput = document.getElementById("fileInput");
const player = document.getElementById("player");
const loading = document.getElementById("loading");

window.currentSubs = []; 
window.currentVideoPath = ""; 

fileInput.onchange = e => {
    if(e.target.files[0]) {
        player.src = URL.createObjectURL(e.target.files[0]);
        player.classList.remove("hidden");
        document.getElementById("uploadUI").classList.add("hidden");
    }
};

function timeToSeconds(t) {
    if(!t) return 0;
    let [h,m,s] = t.split(':');
    return parseInt(h)*3600 + parseInt(m)*60 + parseFloat(s.replace(',', '.'));
}

// BỌC THÉP JAVASCRIPT: Lấy giá trị an toàn, không bị crash
document.getElementById("processBtn").onclick = async () => {
    const file = fileInput.files[0];
    const urlVal = document.getElementById("url")?.value || "";
    const pass = document.getElementById("password")?.value || "";
    
    const styleEl = document.querySelector('input[name="style"]:checked');
    const style = styleEl ? styleEl.value : "normal";
    
    const langEl = document.getElementById("lang");
    const lang = langEl ? langEl.value : "vi";

    if (!file && !urlVal) return alert("Vui lòng tải video lên hoặc nhập URL!");

    document.getElementById("loadingText").innerText = "AI ĐANG BÓC BĂNG & DỊCH...";
    loading.classList.remove("hidden");

    const formData = new FormData();
    formData.append('video', file);
    formData.append('video_url', urlVal);
    formData.append('style', style);
    formData.append('lang', lang);
    formData.append('sys_password', pass);

    try {
        const response = await fetch('/run-tool', { method: 'POST', body: formData });
        const result = await response.json();

        if (result.status === 'success') {
            window.currentVideoPath = result.data.video_url; 
            document.getElementById("btnExportVideo").classList.remove("hidden"); 
            
            if (result.data.video_url) {
                player.src = result.data.video_url;
                player.classList.remove("hidden");
                document.getElementById("uploadUI").classList.add("hidden");
            }

            window.currentSubs = [];
            const viBlocks = result.data.vi_srt.split('\n\n').filter(b => b.trim());
            const zhBlocks = (result.data.zh_srt || "").split('\n\n').filter(b => b.trim());

            viBlocks.forEach((block, i) => {
                const lines = block.split('\n');
                const timeLine = lines.find(l => l.includes('-->'));
                if(!timeLine) return;
                
                const [startStr, endStr] = timeLine.split(' --> ');
                window.currentSubs.push({
                    index: i,
                    time: timeLine,
                    start: timeToSeconds(startStr),
                    end: timeToSeconds(endStr),
                    textVi: lines.slice(lines.indexOf(timeLine) + 1).join('\n'),
                    textZh: zhBlocks[i] ? zhBlocks[i].split('\n').slice(1).join('\n') : ""
                });
            });
            renderSubsUI();
        } else throw new Error(result.detail);
    } catch (err) { alert("Lỗi Server: " + err.message); } 
    finally { loading.classList.add("hidden"); } // Tắt Loading an toàn 100%
};

function renderSubsUI(){
    const container = document.getElementById("subs");
    container.innerHTML = "";

    window.currentSubs.forEach((sub) => {
        const div = document.createElement("div");
        div.id = `sub-card-${sub.index}`;
        div.className="sub-item p-4 rounded-xl glass border border-transparent cursor-pointer group transition-all duration-300";
        
        div.innerHTML=`
        <div class="flex justify-between items-center mb-1.5" onclick="tuaVideo(${sub.start})">
            <div class="text-[10px] font-mono text-cyan-400 bg-black/40 px-2 py-0.5 rounded">${sub.time}</div>
            <i data-lucide="play-circle" class="w-4 h-4 text-cyan-400 opacity-0 group-hover:opacity-100 transition-opacity"></i>
        </div>
        <div class="text-[11px] opacity-40 mb-1 italic font-light">${sub.textZh}</div>
        <div contenteditable="true" onblur="updateSubText(${sub.index}, this.innerText)" class="text-sm font-medium text-white outline-none focus:bg-white/10 focus:ring-1 focus:ring-cyan-400 rounded p-1">${sub.textVi}</div>
        `;
        container.appendChild(div);
    });
    lucide.createIcons();
}

function tuaVideo(seconds) { player.currentTime = seconds; player.play(); }

window.updateSubText = function(index, newText) {
    if(window.currentSubs[index]) window.currentSubs[index].textVi = newText.trim();
}

let lastActiveIndex = -1;
player.addEventListener('timeupdate', () => {
    if(!window.currentSubs || window.currentSubs.length === 0) return;
    const t = player.currentTime;
    let activeIndex = -1;
    
    window.currentSubs.forEach((sub, i) => { if(t >= sub.start && t <= sub.end) activeIndex = i; });

    if (activeIndex !== lastActiveIndex) {
        document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('sub-active'));
        if(activeIndex !== -1) {
            const activeCard = document.getElementById(`sub-card-${activeIndex}`);
            if(activeCard) {
                activeCard.classList.add('sub-active');
                activeCard.scrollIntoView({behavior: 'smooth', block: 'center'});
            }
        }
        lastActiveIndex = activeIndex;
    }
});

function generateSrtString() {
    let finalSrt = "";
    window.currentSubs.forEach((sub, i) => { finalSrt += `${i + 1}\n${sub.time}\n${sub.textVi}\n\n`; });
    return finalSrt.trim();
}

document.getElementById("btnExport").onclick = () => {
    if (window.currentSubs.length === 0) return alert("Chưa có dữ liệu để tải!");
    const blob = new Blob(["\ufeff" + generateSrtString()], { type: 'text/srt;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'ViralSub_Pro.srt'; a.click();
};

document.getElementById("btnExportVideo").onclick = async () => {
    if (!window.currentVideoPath || window.currentSubs.length === 0) return alert("Chưa có video hoặc phụ đề!");
    
    document.getElementById("loadingText").innerText = "ĐANG ÉP CHỮ VÀO VIDEO...";
    loading.classList.remove("hidden");

    const formData = new FormData();
    formData.append("video_path", window.currentVideoPath);
    formData.append("srt_content", generateSrtString());

    try {
        const response = await fetch('/burn-video', { method: 'POST', body: formData });
        const result = await response.json();

        if (result.status === 'success') {
            const a = document.createElement('a');
            a.href = result.video_url; a.download = 'ViralSub_Hardsub.mp4'; a.click();
            alert("Ép chữ xong! Video đang được tải về.");
        } else throw new Error(result.detail);
    } catch (err) { alert("Lỗi ép video: " + err.message); } 
    finally { loading.classList.add("hidden"); }
};

const overlay = document.getElementById("overlay");
function openSheet(id) { overlay.classList.remove("hidden"); document.getElementById(id).classList.add("active"); }
function closeSheets() { overlay.classList.add("hidden"); document.querySelectorAll(".bottom-sheet").forEach(s=>s.classList.remove("active")); }
</script>
</body>
</html>
